name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your main branch is master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create env.js from Secrets
        run: |
          echo "window.ENV = {" > env.js
          echo "    FB_API_KEY: \"${{ secrets.FB_API_KEY }}\"," >> env.js
          echo "    FB_AUTH_DOMAIN: \"${{ secrets.FB_AUTH_DOMAIN }}\"," >> env.js
          echo "    FB_PROJECT_ID: \"${{ secrets.FB_PROJECT_ID }}\"," >> env.js
          echo "    FB_STORAGE_BUCKET: \"${{ secrets.FB_STORAGE_BUCKET }}\"," >> env.js
          echo "    FB_MESSAGING_SENDER_ID: \"${{ secrets.FB_MESSAGING_SENDER_ID }}\"," >> env.js
          echo "    FB_APP_ID: \"${{ secrets.FB_APP_ID }}\"," >> env.js
          echo "    FB_MEASUREMENT_ID: \"${{ secrets.FB_MEASUREMENT_ID }}\"" >> env.js
          echo "};" >> env.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
